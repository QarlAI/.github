name: CI/CD - Shared Build, Push, and Sync Infra

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Environment"
      target_branch:
        required: true
        type: string
        description: "Branch name (e.g., develop, main)"
      images_yaml_path:
        required: true
        type: string
        description: "Path to the values file (e.g., helm/qarl-studio/images.yaml)"
      target_repo:
        required: true
        type: string
        description: "Target repo to update"
      yaml_key_prefix:
        required: true
        type: string
        description: "The root key in the yaml (e.g., .qarl-backend-api)"
    secrets:
      INFRA_REPO_PAT:
        required: true

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Service Repo
        uses: actions/checkout@v4

      - name: Set Deployment Metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha || github.sha }}" | cut -c1-7)
          
          if [[ "${{ github.event.pull_request.merged }}" == "true" ]] || [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "repo=dockerimg" >> $GITHUB_OUTPUT
          else
            echo "repo=dockerimgstaging" >> $GITHUB_OUTPUT
          fi
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        if: steps.meta.outputs.tag != ''
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: 'projects/1093867875731/locations/global/workloadIdentityPools/github/providers/github-provider'
          service_account: 'qarl-studio-backend-sa@qarl-studio.iam.gserviceaccount.com'
      
      - name: Authenticate Docker to GAR
        if: steps.meta.outputs.tag != ''
        run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        if: steps.meta.outputs.tag != ''
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build and Push
        if: steps.meta.outputs.tag != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Using your target_repo input here!
          tags: us-docker.pkg.dev/qarlproductionregistries/${{ steps.meta.outputs.repo }}/${{ inputs.target_repo }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        
      - name: Checkout Infra Repo
        if: steps.meta.outputs.tag != ''
        uses: actions/checkout@v4
        with:
          repository: QarlAI/test-repo2
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra-repo
          fetch-depth: 0 

      - name: Pull Latest Sync Branch (If Exists)
        if: steps.meta.outputs.tag != ''
        run: |
          cd infra-repo
          SYNC_BRANCH="sync/${{ github.head_ref || github.ref_name }}"
          if git ls-remote --exit-code --heads origin $SYNC_BRANCH; then
            echo "Branch $SYNC_BRANCH exists! Checking it out to append changes."
            git checkout $SYNC_BRANCH
            git pull origin $SYNC_BRANCH --rebase
            
          else
            echo "Branch $SYNC_BRANCH does not exist yet. Proceeding from main."
          fi
          

      - name: Update images.yaml (Smart Merge)
        if: steps.meta.outputs.tag != ''
        run: |
          cd infra-repo
          SERVICE_NAME="${{ inputs.target_repo }}"
          NEW_TAG="${{ steps.meta.outputs.tag }}"
          REPO_PATH="us-docker.pkg.dev/qarlproductionregistries/${{ steps.meta.outputs.repo }}/${SERVICE_NAME}"
          SYNC_BRANCH="sync/${{ github.head_ref || github.ref_name }}"
          
          echo "🏁 Target Sync Branch: $SYNC_BRANCH"
          
          # 1. Fetch the absolute latest from GitHub
          git fetch origin
          
          # 2. Check if the PR branch already exists on GitHub
          if git ls-remote --exit-code --heads origin "$SYNC_BRANCH"; then
            echo "✅ PR Branch exists! Reaching into the branch to grab the already-updated images.yaml..."
            
            # This forcibly overwrites our local file with the one from the PR
            git checkout origin/"$SYNC_BRANCH" -- ${{ inputs.images_yaml_path }}
            echo "📥 Successfully pulled file from PR branch."
          else
            echo "❌ PR Branch does not exist yet. Using the base branch version."
          fi

          echo "================ BEFORE EDIT ================"
          cat ${{ inputs.images_yaml_path }}
          echo "============================================="
          
          # 3. Build the YQ Path
          PREFIX="${{ inputs.yaml_key_prefix }}"
          if [ -z "$PREFIX" ]; then
            YQ_PATH=".${SERVICE_NAME}"
          else
            YQ_PATH="${PREFIX}.${SERVICE_NAME}"
          fi
          
          echo "✏️ Updating YQ path: ${YQ_PATH}"
          
          # 4. Apply the new tag
          yq -i "${YQ_PATH}.image.repository = \"${REPO_PATH}\"" ${{ inputs.images_yaml_path }}
          yq -i "${YQ_PATH}.image.tag = \"${NEW_TAG}\"" ${{ inputs.images_yaml_path }}

          echo "================ AFTER EDIT ================="
          cat ${{ inputs.images_yaml_path }}
          echo "============================================="

      - name: Create or Update Infra PR
        if: steps.meta.outputs.tag != ''
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra-repo
          branch: sync/${{ github.head_ref || github.ref_name }}
          # THIS is where the target branch goes to tell the PR where to merge
          base: ${{ inputs.target_branch }}
          title: "Infra Update: ${{ github.head_ref || github.ref_name }}"
          commit-message: "deploy: update ${{ inputs.target_repo }} to ${{ steps.meta.outputs.tag }}"
          body: |
            Automated image update from `${{ inputs.target_repo }}`.
            **Tag:** `${{ steps.meta.outputs.tag }}`
            **Registry:** `${{ steps.meta.outputs.repo }}`
