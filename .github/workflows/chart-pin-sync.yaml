name: Chart Pin Sync

# Mirror of build-push-sync, but for Helm chart version pins instead of image
# tags. Called by a chart's publish workflow after `helm push` succeeds; opens
# (or updates) a sync PR on qarl-studio-infra that bumps the dependency pin in
# the listed umbrella Chart.yaml files.

on:
  workflow_call:
    inputs:
      chart_name:
        required: true
        type: string
        description: "Helm chart name (matches dependencies[].name in umbrella Chart.yaml)"
      chart_version:
        required: true
        type: string
        description: "New chart version to pin (e.g. 0.1.2)"
      umbrella_paths:
        required: true
        type: string
        description: "Newline-separated paths in qarl-studio-infra to umbrella Chart.yaml files (e.g. helm/qarl-live/Chart.yaml)"
      target_branch:
        required: false
        type: string
        default: develop
        description: "Branch on qarl-studio-infra to open the sync PR against"
    secrets:
      INFRA_REPO_PAT:
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Infra Repo
        uses: actions/checkout@v4
        with:
          repository: QarlAI/qarl-studio-infra
          token: ${{ secrets.INFRA_REPO_PAT }}
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Update chart pins + open/update sync PR
        env:
          GH_TOKEN: ${{ secrets.INFRA_REPO_PAT }}
          CHART_NAME: ${{ inputs.chart_name }}
          CHART_VERSION: ${{ inputs.chart_version }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
          UMBRELLA_PATHS: ${{ inputs.umbrella_paths }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          SYNC_BRANCH="sync/chart-${CHART_NAME}-${CHART_VERSION}"

          git config user.name "GitOps Bot"
          git config user.email "bot@qarl.ai"
          git fetch origin

          if git ls-remote --exit-code --heads origin "$SYNC_BRANCH" >/dev/null; then
            git checkout "$SYNC_BRANCH"
            git pull origin "$SYNC_BRANCH" --rebase
          else
            git checkout -b "$SYNC_BRANCH"
          fi

          UPDATED_FILES=()
          while IFS= read -r UMBRELLA; do
            [ -z "$UMBRELLA" ] && continue
            if [ ! -f "$UMBRELLA" ]; then
              echo "WARN: $UMBRELLA not found — skipping"
              continue
            fi
            # Bump the matching dependency's version (alias-aware — match on name)
            yq -i "(.dependencies[] | select(.name == \"$CHART_NAME\")).version = \"$CHART_VERSION\"" "$UMBRELLA"
            # Bump the umbrella's own patch version to mark a release
            CUR=$(yq '.version' "$UMBRELLA")
            MAJ_MIN=$(echo "$CUR" | cut -d. -f1,2)
            PATCH=$(echo "$CUR" | cut -d. -f3)
            yq -i ".version = \"${MAJ_MIN}.$((PATCH + 1))\"" "$UMBRELLA"
            git add "$UMBRELLA"
            UPDATED_FILES+=("$UMBRELLA")
          done <<< "$UMBRELLA_PATHS"

          if git diff-index --quiet HEAD; then
            echo "No changes to commit (umbrella already at $CHART_VERSION)."
            exit 0
          fi

          git commit -m "deploy: bump ${CHART_NAME} chart to ${CHART_VERSION}"
          git push origin "$SYNC_BRANCH"

          PR_NUMBER=$(gh pr list \
            --repo QarlAI/qarl-studio-infra \
            --head "$SYNC_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          PR_BODY=$(printf "Auto-generated by chart-pin-sync from \`%s@%s\`.\n\nUpdates the \`%s\` dependency to \`%s\` in:\n%s" \
            "$SOURCE_REPO" "$SOURCE_SHA" \
            "$CHART_NAME" "$CHART_VERSION" \
            "$(printf -- '- `%s`\n' "${UPDATED_FILES[@]}")")

          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --repo QarlAI/qarl-studio-infra \
              --base "$TARGET_BRANCH" \
              --head "$SYNC_BRANCH" \
              --title "deploy: bump ${CHART_NAME} chart to ${CHART_VERSION}" \
              --body "$PR_BODY"
          else
            echo "PR #$PR_NUMBER already exists for $SYNC_BRANCH; updated commits pushed."
          fi
